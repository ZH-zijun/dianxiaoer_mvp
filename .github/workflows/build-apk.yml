# =============================================================================
# GitHub Actions — 店小二 APK 自动打包 (终极环境伪装版)
# =============================================================================

name: Build APK with Python3.11 (Final)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK with Buildozer (Python 3.11 Final)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. 检出代码 ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. 安装系统依赖和 Python 3.11 ──
      - name: Install system dependencies and Python 3.11
        run: |
          sudo apt update -qq
          sudo apt install -y -qq \
            python3-pip \
            openjdk-17-jdk \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev
          # 安装 Python 3.11
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt update -qq
          sudo apt install -y -qq python3.11 python3.11-dev python3.11-venv

      # ── 3. 终极环境伪装：强制劫持 python3 命令 ──
      - name: Force hijack python3 command to 3.11
        run: |
          # 核心步骤：创建一个指向 python3.11 的“假” python3，放在前面
          # 这会让所有脚本里偷偷调用 python3 的地方，实际上都跑去执行 3.11！
          sudo ln -sf /usr/bin/python3.11 /usr/local/bin/python3
          /usr/local/bin/python3 --version  # 应该输出 3.11.x
          
          # 同时，也把 python3 命令本身替换掉
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
          sudo update-alternatives --set python3 /usr/bin/python3.11
          python3 --version  # 双重保险，这里也必须是 3.11.x

      # ── 4. 安装 Buildozer 并绕开 root 检查 ──
      - name: Install Buildozer and disable root check
        run: |
          # 现在 python3 就是 3.11 了，直接用
          python3 -m pip install --user buildozer cython
          
          # 暴力修复：注释掉 root 检查
          BUILDOZER_PATH=$(python3 -c "import buildozer, os; print(os.path.dirname(buildozer.__file__))")
          sed -i 's/self.check_root()/# self.check_root() # forcefully disabled/' $BUILDOZER_PATH/__init__.py
          
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ── 5. 缓存 Buildozer 的 Android SDK/NDK ──
      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            !~/.buildozer/android/platform
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # ── 6. 运行 Buildozer 打包 ──
      - name: Build APK with buildozer
        run: |
          export CI=true
          export BUILD_TYPE=${{ github.event.inputs.build_type || 'debug' }}
          if [ "$BUILD_TYPE" = "release" ]; then
            echo "⚠️  Release build 需要配置签名密钥，当前暂不支持"
            echo "回退到 debug 构建"
            BUILD_TYPE="debug"
          fi
          # 现在，整个环境里的 python3 都是 3.11 了，直接调用 buildozer
          buildozer android $BUILD_TYPE

      # ── 7. 上传 APK 到 Actions 产物 ──
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dianxiaoer-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 7
