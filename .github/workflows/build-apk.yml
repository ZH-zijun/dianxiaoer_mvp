# =============================================================================
# GitHub Actions — 店小二 APK 自动打包 (修复文件路径版)
# =============================================================================

name: Build APK (Final Fix)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK with Buildozer (Final)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. 检出代码 ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. 安装系统依赖和 Python 3.11 ──
      - name: Install system dependencies and Python 3.11
        run: |
          sudo apt update -qq
          sudo apt install -y -qq \
            python3-pip \
            openjdk-17-jdk \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev
          # 安装 Python 3.11
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt update -qq
          sudo apt install -y -qq python3.11 python3.11-dev python3.11-venv

      # ── 3. 安装 Buildozer 并执行终极源码修改 ──
      - name: Install Buildozer and apply final source fix
        run: |
          # 使用 python3.11 来安装 buildozer 和 cython
          python3.11 -m pip install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          # === 战术修正：用 find 命令精准定位要修改的文件 ===
          # 先找到 buildozer 的安装位置
          BUILDOZER_LIB=$(python3.11 -c "import buildozer, os; print(os.path.dirname(buildozer.__file__))")
          echo "Buildozer library is at: $BUILDOZER_LIB"
          
          # 从 buildozer 的安装位置开始，寻找 toolchain.py
          P4A_TOOLS_PATH=$(find $BUILDOZER_LIB -name "toolchain.py" -path "*/pythonforandroid/*" 2>/dev/null | head -1)
          echo "Patching: $P4A_TOOLS_PATH"

          if [ -z "$P4A_TOOLS_PATH" ]; then
            echo "Error: Could not find python-for-android toolchain.py"
            exit 1
          fi

          # 核心步骤：直接修改源码！
          # 把获取 hostpython 版本的函数改成直接返回我们需要的版本号
          sudo sed -i "s/hostpython_version = .*/hostpython_version = '3.11.1'  # FORCE PATCHED/" $P4A_TOOLS_PATH
          echo "Toolchain patch applied!"

          # 同样，也找到并修改 prerequisites.py
          PREREQ_PATH=$(find $BUILDOZER_LIB -name "prerequisites.py" -path "*/pythonforandroid/*" 2>/dev/null | head -1)
          echo "Patching prerequisites: $PREREQ_PATH"
          if [ -n "$PREREQ_PATH" ]; then
            sudo sed -i "s/hostpython3_version = .*/hostpython3_version = '3.11.1'  # FORCE PATCHED/" $PREREQ_PATH
            echo "Prerequisites patch applied!"
          fi

          echo "All patches applied!"

      # ── 4. 缓存 Buildozer 的 Android SDK/NDK ──
      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            !~/.buildozer/android/platform
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # ── 5. 运行 Buildozer 打包 ──
      - name: Build APK with buildozer
        run: |
          export CI=true
          export BUILD_TYPE=${{ github.event.inputs.build_type || 'debug' }}
          if [ "$BUILD_TYPE" = "release" ]; then
            echo "⚠️  Release build 需要配置签名密钥，当前暂不支持"
            echo "回退到 debug 构建"
            BUILD_TYPE="debug"
          fi
          # 使用 python3.11 来运行 buildozer
          python3.11 -m buildozer android $BUILD_TYPE

      # ── 6. 上传 APK 到 Actions 产物 ──
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dianxiaoer-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 7
