# =============================================================================
# GitHub Actions — 店小二 APK 自动打包
# =============================================================================

name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK with Buildozer
    runs-on: ubuntu-22.04

    steps:
      # ── 1. 检出代码 ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. 安装系统依赖 ──
      - name: Install system dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y -qq \
            python3-pip \
            openjdk-17-jdk \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev
          java -version

      # ── 3. 安装 Python 3.11（项目要求）──
      - name: Install Python 3.11
        run: |
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt update -qq
          sudo apt install -y -qq python3.11 python3.11-dev python3.11-venv

      # ── 4. 安装 buildozer ──
      - name: Install Buildozer
        run: |
          # 核心修复：直接使用 python3.11 命令来运行 pip 和 buildozer
          # 避免与系统自带的 Python 3.14 产生冲突
          python3.11 -m pip install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ── 5. 缓存 buildozer 的 Android SDK/NDK ──
      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            !~/.buildozer/android/platform
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # ── 6. 运行 buildozer 打包 ──
      - name: Build APK with buildozer
        run: |
          export CI=true
          export BUILD_TYPE=${{ github.event.inputs.build_type || 'debug' }}
          if [ "$BUILD_TYPE" = "release" ]; then
            echo "⚠️  Release build 需要配置签名密钥，当前暂不支持"
            echo "回退到 debug 构建"
            BUILD_TYPE="debug"
          fi
          # 同样，使用 python3.11 来执行 buildozer
          python3.11 -m buildozer android $BUILD_TYPE

      # ── 7. 上传 APK 到 Actions 产物 ──
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dianxiaoer-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 7
