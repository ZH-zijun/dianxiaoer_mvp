# =============================================================================
# GitHub Actions — 店小二 APK 自动打包 (Docker 容器版)
# =============================================================================

name: Build APK with Docker

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK with Buildozer (Docker)
    runs-on: ubuntu-latest

    steps:
      # ── 1. 检出代码 ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. 使用 Docker 容器运行 Buildozer ──
      - name: Build APK inside Docker container
        run: |
          # 使用 Buildozer 官方 Docker 镜像，它内部已是稳定的 Python 3.11 环境
          docker run -i \
            -v ${{ github.workspace }}:/app \
            -w /app \
            kivy/buildozer:latest \
            /bin/sh -c "
              echo '=== Starting Build ==='
              buildozer android debug
            "

      # ── 3. 上传 APK 到 Actions 产物 ──
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dianxiaoer-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 7
