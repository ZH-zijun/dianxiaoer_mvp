# =============================================================================
# GitHub Actions — 店小二 APK 自动打包 (Final)
# =============================================================================

name: Build APK (Final)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK with Buildozer (Final)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies and Python 3.11
        run: |
          sudo apt update -qq
          sudo apt install -y -qq \
            python3-pip \
            openjdk-17-jdk \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt update -qq
          sudo apt install -y -qq python3.11 python3.11-dev python3.11-venv

      - name: Force python3 to 3.11
        run: |
          sudo rm -f /usr/bin/python3
          sudo ln -s /usr/bin/python3.11 /usr/bin/python3
          python3 --version

      - name: Install Buildozer
        run: |
          python3.11 -m pip install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            !~/.buildozer/android/platform
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Build APK with buildozer
        run: |
          export CI=true
          export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64    # ← 只加了这一行
          export BUILD_TYPE=${{ github.event.inputs.build_type || 'debug' }}
          if [ "$BUILD_TYPE" = "release" ]; then
            echo "⚠️  Release build 需要配置签名密钥，当前暂不支持"
            BUILD_TYPE="debug"
          fi
          python3.11 -m buildozer android $BUILD_TYPE

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dianxiaoer-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 7
