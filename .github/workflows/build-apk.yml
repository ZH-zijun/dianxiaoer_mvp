# =============================================================================
# GitHub Actions — 店小二 APK 自动打包 (终极修复版)
# =============================================================================

name: Build APK (Final)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK with Buildozer (Final)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies and replace Python with 3.11
        run: |
          sudo apt update -qq
          sudo apt install -y -qq \
            openjdk-17-jdk \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            wget \
            build-essential \
            libreadline-dev \
            libsqlite3-dev \
            libgdbm-dev \
            libbz2-dev
          
          # 核心步骤：下载并编译安装 Python 3.11，物理上替换掉 3.14
          echo "=== Downloading and installing Python 3.11 ==="
          cd /tmp
          wget -q https://www.python.org/ftp/python/3.11.15/Python-3.11.15.tgz
          tar xzf Python-3.11.15.tgz
          cd Python-3.11.15
          ./configure --prefix=/usr --enable-optimizations --with-ensurepip=install 2>&1 | tail -5
          sudo make -j$(nproc) 2>&1 | tail -3
          sudo make install 2>&1 | tail -3
          
          # 验证版本
          echo "=== Python version after installation ==="
          python3 --version
          python3 -m pip --version
          
          # 重新安装 pip 和必需的 Python 包
          python3 -m pip install --upgrade pip setuptools wheel

      - name: Install Buildozer
        run: |
          python3 -m pip install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            !~/.buildozer/android/platform
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Build APK with buildozer
        run: |
          export CI=true
          export BUILD_TYPE=${{ github.event.inputs.build_type || 'debug' }}
          if [ "$BUILD_TYPE" = "release" ]; then
            echo "⚠️  Release build 需要配置签名密钥，当前暂不支持"
            BUILD_TYPE="debug"
          fi
          buildozer android $BUILD_TYPE

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dianxiaoer-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 7
