# =============================================================================
# GitHub Actions — 店小二 APK 自动打包 (Docker 容器版)
# =============================================================================

name: Build APK with Docker

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK with Buildozer (Docker)
    runs-on: ubuntu-latest

    steps:
      # ── 1. 检出代码 ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. 使用 Docker 容器运行 Buildozer ──
      - name: Build APK inside Docker container
        run: |
          docker run -i \
            -v ${{ github.workspace }}:/app \
            -w /app \
            kivy/buildozer:latest \
            /bin/sh -c "
              echo '=== Starting Build ==='
              # 创建一个名为 'builder' 的普通用户并赋予项目目录权限
              adduser --disabled-password --gecos '' builder
              chown -R builder:builder /app
              # 以 'builder' 用户身份运行 Buildozer，彻底避免 root 用户安全提示
              su builder -c 'buildozer android debug'
            "

      # ── 3. 上传 APK 到 Actions 产物 ──
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dianxiaoer-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 7
