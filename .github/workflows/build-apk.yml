# =============================================================================
# GitHub Actions — 店小二 APK 自动打包 (强制 Python 3.11 版)
# =============================================================================

name: Build APK with Python3.11

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK with Buildozer (Python 3.11)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. 检出代码 ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. 安装系统依赖和 Python 3.11 ──
      - name: Install system dependencies and Python 3.11
        run: |
          sudo apt update -qq
          sudo apt install -y -qq \
            python3-pip \
            openjdk-17-jdk \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev
          # 安装 Python 3.11
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt update -qq
          sudo apt install -y -qq python3.11 python3.11-dev python3.11-venv

      # ── 3. 安装 Buildozer 并暴力破解 root 检查 ──
      - name: Install Buildozer and disable root check
        run: |
          # 用 python3.11 安装 buildozer
          python3.11 -m pip install --user buildozer cython
          
          # 找到 buildozer 的安装路径
          BUILDOZER_PATH=$(python3.11 -c "import buildozer, os; print(os.path.dirname(buildozer.__file__))")
          echo "Buildozer is installed at: $BUILDOZER_PATH"
          
          # 强制注释掉 root 用户检查！
          # 这会直接修改源码，让 buildozer 不再问 "Are you sure you want to continue?"
          sed -i 's/self.check_root()/# self.check_root() # forcefully disabled/' $BUILDOZER_PATH/__init__.py
          echo "Root check disabled!"
          
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ── 4. 缓存 Buildozer 的 Android SDK/NDK ──
      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            !~/.buildozer/android/platform
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # ── 5. 运行 Buildozer 打包 ──
      - name: Build APK with buildozer
        run: |
          export CI=true
          export BUILD_TYPE=${{ github.event.inputs.build_type || 'debug' }}
          if [ "$BUILD_TYPE" = "release" ]; then
            echo "⚠️  Release build 需要配置签名密钥，当前暂不支持"
            echo "回退到 debug 构建"
            BUILD_TYPE="debug"
          fi
          # 直接调用 buildozer，它现在不会再问 root 权限了
          python3.11 -m buildozer android $BUILD_TYPE

      # ── 6. 上传 APK 到 Actions 产物 ──
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dianxiaoer-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 7
